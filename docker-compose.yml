# CSPaper & MedPaper 论文生成系统 Docker配置

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  cspaper:
    build:
      context: ./DZYY\ ProjectCSPaper-计算机类论文生成器frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "9091:80"
    depends_on:
      - backend

  medpaper:
    build:
      context: ./DZYY\ ProjectMedPaper-医学生论文生成器frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "9090:80
    depends_on:
      - backend

networks:
  default:
    name: paper-network
